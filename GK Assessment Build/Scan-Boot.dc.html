<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>

<body>
<x-dc>
<helmet>
<link href="assets/vendor/fonts/fonts.css" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#02040a;}
  text{font-family:'IBM Plex Mono',monospace;}
  /* idle motion */
  @keyframes sb-spin{to{transform:rotate(360deg);}}
  @keyframes sb-spin-r{to{transform:rotate(-360deg);}}
  @keyframes sb-sweepY{0%{transform:translateY(-196px);opacity:0;}12%{opacity:1;}88%{opacity:1;}100%{transform:translateY(196px);opacity:0;}}
  @keyframes sb-meridian{0%,100%{transform:scaleX(.06);opacity:.35;}50%{transform:scaleX(1);opacity:1;}}
  @keyframes sb-wave{to{transform:translateX(-160px);}}
  @keyframes sb-helix{0%,100%{transform:scaleX(1);}50%{transform:scaleX(.32);}}
  @keyframes sb-pulse{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:1;transform:scale(1.22);}}
  @keyframes sb-blink{0%,100%{opacity:1;}50%{opacity:.3;}}
  @keyframes sb-bars{0%,100%{transform:scaleY(.4);}50%{transform:scaleY(1);}}
  /* drive */
  @keyframes sb-fade{from{opacity:0;}to{opacity:1;}}
  @keyframes sb-barfill{from{transform:scaleX(0);}to{transform:scaleX(1);}}
  @keyframes sb-lbl{0%{opacity:0;}14%{opacity:1;}86%{opacity:1;}100%{opacity:0;}}
  @keyframes sb-flash{0%{opacity:0;}22%{opacity:.9;}100%{opacity:0;}}
  @keyframes sb-rise{0%{transform:translateY(14px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
  .fa-in{opacity:0;animation:sb-rise .7s cubic-bezier(.2,.7,.2,1) .1s forwards;}
  .wg{opacity:0;animation:sb-fade .7s ease both;}
  .core{opacity:0;animation:sb-fade .9s ease .1s both;}
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;}
    .fa-in,.wg,.core{opacity:1!important;}
    .barfill{transform:scaleX(1)!important;}
    .ringfill{stroke-dashoffset:0!important;}
    .lbl{opacity:0!important;} .lbl.final{opacity:1!important;}
  }
</style>
</helmet>
<div data-screen-label="Scan Boot" style="position:relative;display:flex;flex-direction:column;min-height:100dvh;width:100%;overflow:hidden;background:radial-gradient(120% 100% at 50% 44%,#0a1526 0%,#060c18 46%,#02040a 100%);color:#EAF2FB;font-family:'Archivo',system-ui,sans-serif;--accent:{{ accent }};">

<script type="text/x-dc" data-dc-script data-props="{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#22D3EE&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#22D3EE&quot;,&quot;#A78BFA&quot;,&quot;#C6FF3A&quot;,&quot;#FF7A45&quot;,&quot;#FF4D8D&quot;],&quot;section&quot;:&quot;Theme&quot;},&quot;motion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Theme&quot;}}">
class Component extends DCLogic {
  // CSS-driven scene (reveals, idle motion, bar). A tiny rAF writes only the two
  // counter nodes directly via refs — no React re-renders, so the scene stays static.
  RING = 263.9; DUR = 4600;
  componentDidMount(){
    let reduced = false;
    try { reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(e){}
    if (reduced) {
      if (this._pctNode) this._pctNode.textContent = '100';
      if (this._ringNode) this._ringNode.style.strokeDashoffset = '0';
      this._nt = setTimeout(() => this._nav(), 700);
      return;
    }
    const t0 = (typeof performance!=='undefined'&&performance.now)?performance.now():Date.now();
    const tick = () => {
      const now = (typeof performance!=='undefined'&&performance.now)?performance.now():Date.now();
      const pr = Math.min(1, (now - t0) / this.DUR);
      if (this._pctNode) this._pctNode.textContent = Math.round(pr * 100);
      if (this._ringNode) this._ringNode.style.strokeDashoffset = (this.RING * (1 - pr)).toFixed(1);
      if (pr < 1) this._raf = requestAnimationFrame(tick);
    };
    this._raf = requestAnimationFrame(tick);
    this._nt = setTimeout(() => this._nav(), 5350);
  }
  _nav(){
    if (this._gone) return; this._gone = true;
    if (this._raf) cancelAnimationFrame(this._raf);
    clearTimeout(this._nt);
    try { window.location.href = 'Position-Select-Field.dc.html'; } catch(e) {}
  }
  _skip(){ this._nav(); }
  componentWillUnmount(){ if (this._raf) cancelAnimationFrame(this._raf); clearTimeout(this._nt); }

  renderVals(){
    const accent = this.props.accent ?? '#22D3EE';
    const motion = this.props.motion ?? true;
    const a = (s) => motion ? s : '';
    return {
      accent, motion,
      pctRef: (el) => { this._pctNode = el; },
      ringRef: (el) => { this._ringNode = el; },
      animRing: a('animation:sb-spin 44s linear infinite;'),
      animRingR: a('animation:sb-spin-r 60s linear infinite;'),
      animMeridian: a('animation:sb-meridian 3.4s ease-in-out infinite;'),
      animSweep: a('animation:sb-sweepY 3.6s cubic-bezier(.45,0,.55,1) infinite;'),
      animEye: a('animation:sb-pulse 1.9s ease-in-out infinite;'),
      animWave: a('animation:sb-wave 2.2s linear infinite;'),
      animWave2: a('animation:sb-wave 2.8s linear infinite;'),
      animHelix: a('animation:sb-helix 4s ease-in-out infinite;'),
      animRadar: a('animation:sb-spin 3.4s linear infinite;'),
      animDot: a('animation:sb-pulse 1.6s ease-in-out infinite;'),
      animBar1: a('animation:sb-bars 1.1s ease-in-out infinite;'),
      animBar2: a('animation:sb-bars 1.4s ease-in-out infinite .2s;'),
      animBar3: a('animation:sb-bars 0.9s ease-in-out infinite .1s;'),
      animBarFill: a('animation:sb-barfill 4.6s linear forwards;'),
      skip: () => this._skip(),
    };
  }
}
