<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="assets/vendor/fonts/fonts.css" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#02040a;}
  text{font-family:'IBM Plex Mono',monospace;}
  @keyframes sb-spin{to{transform:rotate(360deg);}}
  @keyframes sb-spin-r{to{transform:rotate(-360deg);}}
  @keyframes sb-pulse{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.12);}}
  @keyframes sb-orb{0%,100%{opacity:.72;transform:scale(1);}50%{opacity:1;transform:scale(1.05);}}
  @keyframes sb-blink{0%,100%{opacity:1;}50%{opacity:.3;}}
  @keyframes sb-bars{0%,100%{transform:scaleY(.4);}50%{transform:scaleY(1);}}
  @keyframes sb-arc{0%{opacity:.25;}50%{opacity:1;}100%{opacity:.25;}}
  @keyframes sb-fade{from{opacity:0;}to{opacity:1;}}
  @keyframes sb-barfill{from{transform:scaleX(0);}to{transform:scaleX(1);}}
  @keyframes sb-lbl{0%{opacity:0;}14%{opacity:1;}86%{opacity:1;}100%{opacity:0;}}
  @keyframes sb-flash{0%{opacity:0;}22%{opacity:.9;}100%{opacity:0;}}
  @keyframes sb-rise{0%{transform:translateY(14px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
  .fa-in{opacity:0;animation:sb-rise .7s cubic-bezier(.2,.7,.2,1) .1s forwards;}
  .wg{opacity:0;animation:sb-fade .7s ease both;}
  .core{opacity:0;animation:sb-fade .9s ease .1s both;}
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;}
    .fa-in,.wg,.core{opacity:1!important;}
    .barfill{transform:scaleX(1)!important;}
    .ringfill{stroke-dashoffset:0!important;}
    .lbl{opacity:0!important;} .lbl.final{opacity:1!important;}
  }
</style>
</helmet>
<div data-screen-label="Scan Boot" style="position:relative;display:flex;flex-direction:column;min-height:100dvh;width:100%;overflow:hidden;background:radial-gradient(120% 100% at 50% 46%,#0a1526 0%,#050b16 48%,#02040a 100%);color:#EAF2FB;font-family:'Archivo',system-ui,sans-serif;--accent:{{ accent }};">

  <div style="position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.35;background:repeating-linear-gradient(0deg,rgba(255,255,255,.02) 0px,rgba(255,255,255,.02) 1px,transparent 1px,transparent 4px);"></div>

  <div style="position:absolute;inset:0;z-index:9;pointer-events:none;opacity:0;background:radial-gradient(120% 100% at 50% 45%,color-mix(in srgb,var(--accent,#22D3EE) 32%,transparent) 0%,transparent 60%);animation:sb-flash 1.1s ease-out 4.5s forwards;"></div>

  <main style="position:relative;z-index:5;flex:1;min-height:0;display:grid;place-items:center;padding:12px;">
    <div style="position:relative;container-type:size;width:min(98vw,calc(96dvh*1376/768));aspect-ratio:1376/768;">

    <!-- center energy core (scan-core.png drops in here once committed) -->
    <div class="core" style="position:absolute;left:50%;top:50%;width:41%;aspect-ratio:1/1;transform:translate(-50%,-50%);z-index:1;">
      <div style="position:absolute;inset:-18%;border-radius:50%;background:radial-gradient(circle, color-mix(in srgb,var(--accent,#22D3EE) 26%,transparent) 0%, transparent 60%);animation:sb-orb 3.6s ease-in-out infinite;"></div>
      <sc-if value="{{ hasCore }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;inset:0;">
          <img src="assets/img/scan-core.png" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;mix-blend-mode:screen;filter:drop-shadow(0 0 26px color-mix(in srgb,var(--accent,#22D3EE) 45%,transparent));animation:sb-spin 60s linear infinite;"/>
          <img src="assets/img/scan-core.png" alt="" style="position:absolute;inset:6%;width:88%;height:88%;object-fit:contain;mix-blend-mode:screen;opacity:.5;animation:sb-spin-r 42s linear infinite;"/>
        </div>
      </sc-if>
    </div>

    <svg viewBox="0 0 1376 768" preserveAspectRatio="xMidYMid meet" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:2;">
      <defs>
        <filter id="sbGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <linearGradient id="sbBand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="{{ accent }}" stop-opacity="0"/><stop offset="0.5" stop-color="#EAFDFF"/><stop offset="1" stop-color="{{ accent }}" stop-opacity="0"/></linearGradient>
        <linearGradient id="sbWedge" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="{{ accent }}" stop-opacity="0.55"/><stop offset="1" stop-color="{{ accent }}" stop-opacity="0"/></linearGradient>
        <linearGradient id="sbArc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#EAFDFF"/><stop offset="1" stop-color="{{ accent }}" stop-opacity="0"/></linearGradient>
      </defs>

      <!-- frame border -->
      <rect x="10" y="10" width="1356" height="748" rx="20" fill="none" stroke="color-mix(in srgb, {{ accent }} 24%, transparent)" stroke-width="1.5"/>
      <path d="M30 10 H10 V30 M1346 10 H1366 V30 M30 758 H10 V738 M1346 758 H1366 V738" fill="none" stroke="{{ accent }}" stroke-width="2.4" stroke-linecap="round"/>
      <text x="34" y="748" fill="color-mix(in srgb, {{ accent }} 46%, transparent)" font-size="9" letter-spacing="3">POSITION-DNA · BIOMETRIC SCAN INTERFACE</text>

        <path d="M940 300 L1090 232 L1266 232"/><circle cx="1266" cy="232" r="2.4" fill="{{ accent }}"/>
        <path d="M958 468 L1120 470"/><circle cx="1120" cy="470" r="2.4" fill="{{ accent }}"/>
        <path d="M418 468 L256 470"/><circle cx="256" cy="470" r="2.4" fill="{{ accent }}"/>
      </g>

      <!-- ============ CENTER RETICLE (frames the core) ============ -->
      <g class="core">
        <!-- inner frame ring just outside the core -->
        <circle cx="688" cy="384" r="256" fill="none" stroke="color-mix(in srgb, {{ accent }} 45%, transparent)" stroke-width="1.4"/>

            <circle cx="688" cy="384" r="40" fill="none" stroke="color-mix(in srgb, {{ accent }} 34%,transparent)" stroke-width="1.2"/>
            <circle cx="688" cy="384" r="26" fill="url(#sbArc)" opacity="0.5" filter="url(#sbGlow)" style="transform-box:fill-box;transform-origin:center;{{ animCore }}"/>
            <circle cx="688" cy="384" r="9" fill="#EAFDFF" filter="url(#sbGlow)" style="transform-box:fill-box;transform-origin:center;{{ animCore }}"/>
          </g>
        </sc-if>
      </g>

      <!-- ============ TOP-CENTER status strip ============ -->
      <g class="wg" style="animation-delay:.3s;" text-anchor="middle">
        <text x="688" y="40" fill="color-mix(in srgb, {{ accent }} 85%,#fff)" font-size="11" letter-spacing="6">B I O M E T R I C&#160;&#160;S C A N</text>
        <g transform="translate(596 52)" fill="{{ accent }}"><rect width="14" height="4" rx="1"/><rect x="20" width="14" height="4" rx="1" opacity=".8"/><rect x="40" width="14" height="4" rx="1" opacity=".55"/><rect x="132" width="14" height="4" rx="1" opacity=".55"/><rect x="152" width="14" height="4" rx="1" opacity=".8"/><rect x="172" width="14" height="4" rx="1"/></g>

        <g transform="translate(62 168)" fill="{{ accent }}">
          <rect x="0" width="7" height="56" rx="1.5" opacity=".55" style="{{ animBar2 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="12" width="7" height="56" rx="1.5" opacity=".85" style="{{ animBar3 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="24" width="7" height="56" rx="1.5" style="{{ animBar1 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="36" width="7" height="56" rx="1.5" opacity=".7" style="{{ animBar2 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="48" width="7" height="56" rx="1.5" opacity=".9" style="{{ animBar3 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="60" width="7" height="56" rx="1.5" opacity=".5" style="{{ animBar1 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="72" width="7" height="56" rx="1.5" opacity=".8" style="{{ animBar2 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="84" width="7" height="56" rx="1.5" opacity=".6" style="{{ animBar3 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="96" width="7" height="56" rx="1.5" opacity=".85" style="{{ animBar1 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="108" width="7" height="56" rx="1.5" opacity=".5" style="{{ animBar2 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="120" width="7" height="56" rx="1.5" opacity=".75" style="{{ animBar3 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="132" width="7" height="56" rx="1.5" opacity=".6" style="{{ animBar1 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="144" width="7" height="56" rx="1.5" opacity=".9" style="{{ animBar2 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="156" width="7" height="56" rx="1.5" opacity=".5" style="{{ animBar3 }}transform-box:fill-box;transform-origin:bottom;"/>
        </g>
        <line x1="62" y1="170" x2="225" y2="170" stroke="color-mix(in srgb, {{ accent }} 20%,transparent)" stroke-width="1"/>
      </g>

      <!-- ============ TOP-RIGHT : metric gauges ============ -->
      <g class="wg" style="animation-delay:1.3s;" text-anchor="middle">
        <text x="1314" y="84" text-anchor="end" fill="color-mix(in srgb, {{ accent }} 82%,#fff)" font-size="9.5" letter-spacing="2">CALIBRATION</text>
        <g font-size="9" letter-spacing="1">
          <g transform="translate(1104 140)"><circle r="26" fill="none" stroke="rgba(120,140,166,.22)" stroke-width="4"/><circle r="26" fill="none" stroke="{{ accent }}" stroke-width="4" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="13" transform="rotate(-90)" filter="url(#sbGlow)"/><text y="4" fill="#EAF2FB" font-size="15" font-family="Archivo" font-weight="800">92</text><text y="46" fill="#8EA1B8">SYNC</text></g>
          <g transform="translate(1174 140)"><circle r="26" fill="none" stroke="rgba(120,140,166,.22)" stroke-width="4"/><circle r="26" fill="none" stroke="{{ accent }}" stroke-width="4" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="36" transform="rotate(-90)"/><text y="4" fill="#EAF2FB" font-size="15" font-family="Archivo" font-weight="800">78</text><text y="46" fill="#8EA1B8">DEPTH</text></g>
          <g transform="translate(1244 140)"><circle r="26" fill="none" stroke="rgba(120,140,166,.22)" stroke-width="4"/><circle r="26" fill="none" stroke="{{ accent }}" stroke-width="4" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="59" transform="rotate(-90)"/><text y="4" fill="#EAF2FB" font-size="15" font-family="Archivo" font-weight="800">64</text><text y="46" fill="#8EA1B8">GAIN</text></g>
          <g transform="translate(1314 140)"><circle r="26" fill="none" stroke="rgba(120,140,166,.22)" stroke-width="4"/><circle r="26" fill="none" stroke="{{ accent }}" stroke-width="4" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="20" transform="rotate(-90)" filter="url(#sbGlow)"/><text y="4" fill="#EAF2FB" font-size="15" font-family="Archivo" font-weight="800">88</text><text y="46" fill="#8EA1B8">LOCK</text></g>
        </g>
      </g>

      <!-- ============ LEFT-MID : attribute field ============ -->
      <g class="wg" style="animation-delay:2.0s;">
        <path d="M62 330 h150 M62 330 v-10 M212 330 v-10" stroke="color-mix(in srgb, {{ accent }} 40%,transparent)" stroke-width="1.2" fill="none"/>
        <text x="62" y="322" fill="color-mix(in srgb, {{ accent }} 82%,#fff)" font-size="9.5" letter-spacing="2">ATTRIBUTE FIELD</text>
        <g text-anchor="middle" font-family="Archivo" font-weight="800" font-size="16">
          <g transform="translate(94 372)"><circle r="22" fill="color-mix(in srgb,{{ accent }} 20%,transparent)" stroke="{{ accent }}" stroke-width="1.4"/><text y="5" fill="#EAF2FB">75</text></g>
          <g transform="translate(148 372)"><circle r="22" fill="rgba(12,19,32,.55)" stroke="color-mix(in srgb,{{ accent }} 55%,transparent)" stroke-width="1.4"/><text y="5" fill="#C6D3E2">68</text></g>
          <g transform="translate(202 372)"><circle r="22" fill="rgba(12,19,32,.55)" stroke="rgba(120,140,166,.4)" stroke-width="1.4"/><text y="5" fill="#8EA1B8">21</text></g>
          <g transform="translate(94 428)"><circle r="22" fill="rgba(12,19,32,.55)" stroke="color-mix(in srgb,{{ accent }} 55%,transparent)" stroke-width="1.4"/><text y="5" fill="#C6D3E2">70</text></g>
          <g transform="translate(148 428)"><circle r="22" fill="rgba(12,19,32,.55)" stroke="rgba(120,140,166,.4)" stroke-width="1.4"/><text y="5" fill="#8EA1B8">53</text></g>
          <g transform="translate(202 428)"><circle r="22" fill="color-mix(in srgb,{{ accent }} 20%,transparent)" stroke="{{ accent }}" stroke-width="1.4"/><text y="5" fill="#EAF2FB">64</text></g>
        </g>
      </g>

      <!-- ============ RIGHT-MID : identity vector ============ -->
      <g class="wg" style="animation-delay:2.5s;">
        <path d="M1164 330 h150 M1164 330 v-10 M1314 330 v-10" stroke="color-mix(in srgb, {{ accent }} 40%,transparent)" stroke-width="1.2" fill="none"/>
        <text x="1314" y="322" text-anchor="end" fill="color-mix(in srgb, {{ accent }} 82%,#fff)" font-size="9.5" letter-spacing="2">IDENTITY VECTOR</text>
        <g transform="translate(1164 356)" fill="{{ accent }}">
          <rect x="0" width="6" height="26" rx="1.5" opacity=".6" style="{{ animBar1 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="11" width="6" height="26" rx="1.5" opacity=".85" style="{{ animBar2 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="22" width="6" height="26" rx="1.5" style="{{ animBar3 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="33" width="6" height="26" rx="1.5" opacity=".7" style="{{ animBar1 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="44" width="6" height="26" rx="1.5" opacity=".9" style="{{ animBar2 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="55" width="6" height="26" rx="1.5" opacity=".55" style="{{ animBar3 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="66" width="6" height="26" rx="1.5" opacity=".8" style="{{ animBar1 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="77" width="6" height="26" rx="1.5" opacity=".6" style="{{ animBar2 }}transform-box:fill-box;transform-origin:bottom;"/>
        </g>
        <text x="1314" y="378" text-anchor="end" fill="#8EA1B8" font-size="10">0x7F3A·C9</text>
        <g transform="translate(1164 398)"><rect width="150" height="4" rx="2" fill="rgba(120,140,166,.2)"/><rect width="118" height="4" rx="2" fill="{{ accent }}" filter="url(#sbGlow)"/></g>
        <text x="1164" y="446" fill="#EAF2FB" font-size="26" font-weight="800" font-family="Archivo">958</text>
        <text x="1314" y="446" text-anchor="end" fill="#61748c" font-size="9" letter-spacing="1">VECTOR ID</text>
      </g>

      <!-- ============ BOTTOM-LEFT : telemetry ============ -->
      <g class="wg" style="animation-delay:3.0s;">
        <path d="M62 556 h150 M62 556 v-10 M212 556 v-10" stroke="color-mix(in srgb, {{ accent }} 40%,transparent)" stroke-width="1.2" fill="none"/>
        <text x="62" y="548" fill="color-mix(in srgb, {{ accent }} 82%,#fff)" font-size="9.5" letter-spacing="2">TELEMETRY</text>
        <g fill="color-mix(in srgb, {{ accent }} 34%, transparent)"><rect x="62" y="572" width="120" height="4" rx="2"/><rect x="62" y="582" width="150" height="4" rx="2" fill="rgba(120,140,166,.26)"/><rect x="62" y="592" width="96" height="4" rx="2" fill="rgba(120,140,166,.26)"/></g>
        <g transform="translate(62 664)" fill="{{ accent }}"><rect x="0" width="9" height="34" rx="1.5" opacity=".55" style="{{ animBar2 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="16" width="9" height="34" rx="1.5" opacity=".85" style="{{ animBar3 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="32" width="9" height="34" rx="1.5" style="{{ animBar1 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="48" width="9" height="34" rx="1.5" opacity=".7" style="{{ animBar2 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="64" width="9" height="34" rx="1.5" opacity=".5" style="{{ animBar3 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="80" width="9" height="34" rx="1.5" opacity=".85" style="{{ animBar1 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="96" width="9" height="34" rx="1.5" opacity=".65" style="{{ animBar2 }}transform-box:fill-box;transform-origin:bottom;"/><rect x="112" width="9" height="34" rx="1.5" opacity=".8" style="{{ animBar3 }}transform-box:fill-box;transform-origin:bottom;"/></g>
      </g>

      <!-- ============ BOTTOM-RIGHT : radar scope ============ -->
      <g class="wg" style="animation-delay:3.6s;">
        <path d="M1164 556 h150 M1164 556 v-10 M1314 556 v-10" stroke="color-mix(in srgb, {{ accent }} 40%,transparent)" stroke-width="1.2" fill="none"/>
        <text x="1314" y="548" text-anchor="end" fill="color-mix(in srgb, {{ accent }} 82%,#fff)" font-size="9.5" letter-spacing="2">SCAN FIELD</text>
        <circle cx="1244" cy="650" r="64" fill="rgba(8,16,28,.35)" stroke="color-mix(in srgb, {{ accent }} 26%, transparent)" stroke-width="1.2"/>
        <circle cx="1244" cy="650" r="44" fill="none" stroke="color-mix(in srgb, {{ accent }} 16%, transparent)" stroke-width="1"/>

        <g style="transform-box:view-box;transform-origin:1244px 650px;{{ animRadar }}"><path d="M1244 650 L1244 586 A64 64 0 0 1 1304 626 Z" fill="url(#sbWedge)"/></g>

      <!-- ============ BOTTOM-CENTER : counter + progress ============ -->
      <g class="core">
        <g transform="translate(556 710)">
          <circle r="30" fill="none" stroke="rgba(120,140,166,.18)" stroke-width="3.5"/>
          <circle ref="{{ ringRef }}" class="ringfill" r="30" fill="none" stroke="{{ accent }}" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="188.5" transform="rotate(-90)" filter="url(#sbGlow)"/>
        </g>
        <rect x="612" y="704" width="480" height="9" rx="4.5" fill="rgba(120,140,166,.16)"/>

<script type="text/x-dc" data-dc-script data-props="{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#22D3EE&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#22D3EE&quot;,&quot;#A78BFA&quot;,&quot;#C6FF3A&quot;,&quot;#FF7A45&quot;,&quot;#FF4D8D&quot;],&quot;section&quot;:&quot;Theme&quot;},&quot;motion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Theme&quot;}}">
class Component extends DCLogic {
  RING = 188.5; DUR = 4600;
  componentDidMount(){
    let reduced = false;
    try { reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(e){}
    if (reduced) {
      if (this._pctNode) this._pctNode.textContent = '100';
      if (this._ringNode) this._ringNode.style.strokeDashoffset = '0';
      this._nt = setTimeout(() => this._nav(), 700);
      return;
    }
    const t0 = (typeof performance!=='undefined'&&performance.now)?performance.now():Date.now();
    const tick = () => {
      const now = (typeof performance!=='undefined'&&performance.now)?performance.now():Date.now();
      const pr = Math.min(1, (now - t0) / this.DUR);
      if (this._pctNode) this._pctNode.textContent = Math.round(pr * 100);
      if (this._ringNode) this._ringNode.style.strokeDashoffset = (this.RING * (1 - pr)).toFixed(1);
      if (pr < 1) this._raf = requestAnimationFrame(tick);
    };
    this._raf = requestAnimationFrame(tick);
    this._nt = setTimeout(() => this._nav(), 5350);
  }
  _nav(){
    if (this._gone) return; this._gone = true;
    if (this._raf) cancelAnimationFrame(this._raf);
    clearTimeout(this._nt);
    try { window.location.href = 'Position-Select-Field.dc.html'; } catch(e) {}
  }
  _skip(){ this._nav(); }
  componentWillUnmount(){ if (this._raf) cancelAnimationFrame(this._raf); clearTimeout(this._nt); }

  renderVals(){
    const accent = this.props.accent ?? '#22D3EE';
    const motion = this.props.motion ?? true;
    const a = (s) => motion ? s : '';
    return {
      accent, motion,
      hasCore: false, noCore: true,
      pctRef: (el) => { this._pctNode = el; },
      ringRef: (el) => { this._ringNode = el; },
      animCore: a('animation:sb-orb 2.6s ease-in-out infinite;'),
      animRing: a('animation:sb-spin 48s linear infinite;'),
      animArc: a('animation:sb-spin 6s linear infinite;'),
      animRadar: a('animation:sb-spin 3.4s linear infinite;'),
      animDot: a('animation:sb-pulse 1.6s ease-in-out infinite;'),
      animBar1: a('animation:sb-bars 1.1s ease-in-out infinite;'),
      animBar2: a('animation:sb-bars 1.4s ease-in-out infinite .2s;'),
      animBar3: a('animation:sb-bars 0.9s ease-in-out infinite .1s;'),
      animBarFill: a('animation:sb-barfill 4.6s linear forwards;'),
      skip: () => this._skip(),
    };
  }
}
</script>
