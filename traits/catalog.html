<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="assets/fonts/fonts.css" rel="stylesheet">
<script src="symbols-lib.js"></script>
<script src="data/attacking-midfielder.js"></script>
<script src="data/center-back.js"></script>
<script src="data/full-back.js"></script>
<script src="data/defensive-midfielder.js"></script>
<script src="data/central-midfielder.js"></script>
<script src="data/winger.js"></script>
<script src="data/outside-midfielder.js"></script>
<script src="data/goalkeeper.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:radial-gradient(130% 80% at 50% 0%,#0e1a2d 0%,#080e1a 46%,#04060c 100%);color:#EAF2FB;font-family:'Archivo',system-ui,sans-serif;padding:40px 42px 90px;}
  .head{font:600 11px 'IBM Plex Mono';letter-spacing:.4em;color:#8EA6BD;display:flex;align-items:center;gap:10px;}
  .head .dot{width:6px;height:6px;border-radius:50%;background:#8EA6BD;}
  h1.t{font:800 40px 'Archivo';letter-spacing:-.02em;margin:12px 0 6px;}
  .intro{font:400 15px 'Archivo';color:#9FB0C5;max-width:760px;margin-bottom:20px;}
  .pos{margin-top:56px;padding-top:30px;border-top:1px solid rgba(120,140,166,.18);}
  .poshead{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;}
  .poshead .pn{font:900 30px 'Archivo';letter-spacing:-.01em;color:var(--acc);}
  .poshead .pl{font:600 10px 'IBM Plex Mono';letter-spacing:.24em;color:#7E90A8;}
  .sectt{font:600 10.5px 'IBM Plex Mono';letter-spacing:.28em;color:#8EA6BD;margin:30px 0 16px;}
  /* vocabulary rows */
  .voc{display:flex;align-items:flex-start;gap:20px;margin-bottom:18px;}
  .voc .catcol{width:120px;flex:none;padding-top:16px;}
  .voc .catcol .cnm{font:800 15px 'Archivo';color:#C6D3E2;}
  .voc .catcol .csh{font:600 8.5px 'IBM Plex Mono';letter-spacing:.16em;color:#61748c;margin-top:3px;}
  .voc .items{display:flex;flex-wrap:wrap;gap:16px;}
  .item{width:96px;text-align:center;}
  .b{position:relative;width:78px;height:78px;margin:0 auto 8px;}
  .b .edge{position:absolute;inset:0;background:linear-gradient(160deg,color-mix(in srgb,var(--acc) 55%,#8ea6bd),color-mix(in srgb,var(--acc) 30%,#4a5b6e));}
  .b .face{position:absolute;inset:2px;background:radial-gradient(120% 90% at 50% 22%,#101f30,#0a1524 72%,#07101d);}
  .b .sym{position:absolute;inset:0;display:grid;place-items:center;}
  .b .sym svg{width:34px;height:34px;stroke:var(--acc);stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .lbl{font:700 11px 'Archivo';color:#DCEAF6;}
  .def{font:400 9px/1.25 'Archivo';color:#7E90A8;margin-top:2px;}
  /* shapes */
  .tri .edge,.tri .face{clip-path:polygon(50% 5%,95% 92%,5% 92%);} .tri .sym{padding-top:18px;}
  .dia .edge,.dia .face{clip-path:polygon(50% 2%,98% 50%,50% 98%,2% 50%);}
  .sq .edge,.sq .face{border-radius:0;transform:scale(.8);} /* optical size match — square fills its box, polygons don't */
  .hex .edge,.hex .face{clip-path:polygon(50% 2%,93% 26%,93% 74%,50% 98%,7% 74%,7% 26%);}
  .oct .edge,.oct .face{clip-path:polygon(30% 2%,70% 2%,98% 30%,98% 70%,70% 98%,30% 98%,2% 70%,2% 30%);}
  /* archetype cards */
  .arch{display:flex;flex-wrap:wrap;gap:16px;}
  .acard{width:calc(50% - 8px);min-width:420px;border:1px solid color-mix(in srgb,var(--acc) 22%,rgba(120,140,166,.2));background:linear-gradient(120deg,color-mix(in srgb,var(--acc) 6%,rgba(10,16,28,.55)),rgba(10,16,28,.5));border-radius:16px;padding:16px 18px;}
  .acard .ah{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;}
  .acard .an{font:800 18px 'Archivo';color:#EAF2FB;}
  .acard .at{font:500 11px 'Archivo';color:#8EA6BD;font-style:italic;}
  .pent{display:flex;gap:8px;}
  .pent .p{flex:1;text-align:center;}
  .pent .pb{position:relative;width:52px;height:52px;margin:0 auto 5px;}
  .pent .pb .edge{position:absolute;inset:0;background:color-mix(in srgb,var(--acc) 45%,#5a6b7e);}
  .pent .pb .face{position:absolute;inset:1.5px;background:#0a1524;}
  .pent .pb .sym{position:absolute;inset:0;display:grid;place-items:center;}
  .pent .pb .sym svg{width:22px;height:22px;stroke:var(--acc);stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .pent .pn{font:700 8.5px/1.15 'Archivo';color:#C6D3E2;}
  .pent .tri .edge,.pent .tri .face{clip-path:polygon(50% 5%,95% 92%,5% 92%);} .pent .tri .sym{padding-top:11px;}
  .pent .dia .edge,.pent .dia .face{clip-path:polygon(50% 2%,98% 50%,50% 98%,2% 50%);}
  .pent .sq .edge,.pent .sq .face{border-radius:0;transform:scale(.8);}
  .pent .hex .edge,.pent .hex .face{clip-path:polygon(50% 2%,93% 26%,93% 74%,50% 98%,7% 74%,7% 26%);}
  .pent .oct .edge,.pent .oct .face{clip-path:polygon(30% 2%,70% 2%,98% 30%,98% 70%,70% 98%,30% 98%,2% 70%,2% 30%);}
</style></head>
<body>
<div class="head"><span class="dot"></span>FOOTBALLER'S ACADEMY · TRAIT CATALOG</div>
<h1 class="t">Traits by position &amp; archetype.</h1>
<div class="intro">Five shapes (categories), each a family of position-unique attributes. Every archetype's identity is a balanced pentad — one attribute from each shape. Colour = position accent; final card styling comes later.</div>
<div id="root"></div>
<script>
const CAT={ motor:{name:'MOTOR',shape:'tri',sh:'TRIANGLE'}, technique:{name:'TECHNIQUE',shape:'dia',sh:'DIAMOND'}, vision:{name:'VISION',shape:'sq',sh:'SQUARE'}, impact:{name:'IMPACT',shape:'hex',sh:'HEXAGON'}, spirit:{name:'SPIRIT',shape:'oct',sh:'OCTAGON'} };
const ORDER=['motor','technique','vision','impact','spirit'];
function sym(a){ return a.svg || (window.SYM&&window.SYM[a.sym]) || ''; }
function badge(a,shape,cls){ return `<div class="b ${shape} ${cls||''}"><div class="edge"></div><div class="face"></div><div class="sym"><svg viewBox="0 0 24 24">${sym(a)}</svg></div></div>`; }
const root=document.getElementById('root');
const POS=window.POS_TRAITS||{};
const posOrder=['goalkeeper','center-back','full-back','defensive-midfielder','central-midfielder','attacking-midfielder','winger','outside-midfielder'];
for(const key of posOrder){
  const P=POS[key]; if(!P) continue;
  const sec=document.createElement('div'); sec.className='pos'; sec.style.setProperty('--acc',P.accent);
  // vocabulary
  let voc='';
  for(const cat of ORDER){
    const meta=CAT[cat];
    const ids=Object.keys(P.attrs).filter(id=>P.attrs[id].cat===cat);
    let items='';
    for(const id of ids){ const a=P.attrs[id]; items+=`<div class="item">${badge(a,meta.shape)}<div class="lbl">${a.name}</div><div class="def">${a.def}</div></div>`; }
    voc+=`<div class="voc"><div class="catcol"><div class="cnm">${meta.name}</div><div class="csh">${meta.sh}</div></div><div class="items">${items}</div></div>`;
  }
  // archetypes
  let arch='';
  for(const A of P.archetypes){
    let pent='';
    for(const cat of ORDER){ const id=A.five[cat]; const a=P.attrs[id]||{name:'?'}; pent+=`<div class="p">${badge(a,CAT[cat].shape)}<div class="pn">${a.name}</div></div>`; }
    arch+=`<div class="acard"><div class="ah"><div class="an">${A.name}</div><div class="at">${A.tag}</div></div><div class="pent">${pent}</div></div>`;
  }
  sec.innerHTML=`<div class="poshead"><div class="pn">${P.label}</div><div class="pl">${P.archLabel||''}</div></div>`+
    `<div class="sectt">ATTRIBUTE VOCABULARY</div>${voc}`+
    `<div class="sectt">ARCHETYPES · THE BALANCED FIVE</div><div class="arch">${arch}</div>`;
  root.appendChild(sec);
}
</script>
</body></html>
